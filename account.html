<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My account</title>
    <script src="account.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

</head>
<body class="account-body">
    <section class="account">
        <video autoplay muted loop class="ac-bg">
            <source src="video/ак.mp4" type="video/mp4">
        </video>
        <h2 class="moi"></h2>
        <form class="register-form">
            <input type="text" placeholder="Имя" class="name">
            <input type="email" placeholder="Email" class="email">
            <input type="password" placeholder="Пароль" class="password2">
            <input type="password" placeholder="Повтор пароля" class="again">
            <button class="button-regi">Зарегистрироваться</button>
        </form>
        <h2 class="regi"> Регистрация </h2>
    </section>
</body>
</html>
